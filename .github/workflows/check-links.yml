name: Check curriculum links

on:
  workflow_dispatch:
  push:
    paths:
      - 'src/*Seed.ts'
      - 'src/seed.ts'
      - 'scripts/check-links.mjs'
      - '.github/workflows/check-links.yml'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-links.mjs
